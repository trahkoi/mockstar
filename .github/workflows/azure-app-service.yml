name: Deploy Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: mockstar
  AZURE_PARSER_NAME: heat-parser
  DOTNET_VERSION: 10.0.x

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Mockstar.slnx

      - name: Test
        run: dotnet test Mockstar.slnx --no-restore

      - name: Publish Web
        run: dotnet publish src/Mockstar.Web/Mockstar.Web.csproj -c Release -o publish-web --no-restore

      - name: Publish Parser API
        run: dotnet publish src/Mockstar.ParserApi/Mockstar.ParserApi.csproj -c Release -o publish-parser --no-restore

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: publish-web/

      - name: Upload parser artifact
        uses: actions/upload-artifact@v4
        with:
          name: parserapi
          path: publish-parser/

  deploy-web:
    name: Deploy Web to Azure
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: publish-web/

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: publish-web/

  deploy-parser:
    name: Deploy Parser API to Azure
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: parserapi
          path: publish-parser/

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_PARSER_NAME }}
          package: publish-parser/

